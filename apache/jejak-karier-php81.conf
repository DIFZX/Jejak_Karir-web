# Project-specific PHP runtime for JejakKarier.
# This keeps other XAMPP projects on the default PHP module while this
# application uses Laragon PHP 8.1, whose PostgreSQL client supports SCRAM.

ScriptAlias "/jejak-karier-php81-cgi" "C:/xampp/htdocs/web lamar kerja/.runtime/php81-cgi-launcher.exe"

<Directory "C:/xampp/htdocs/web lamar kerja/.runtime">
    AllowOverride None
    Options +ExecCGI +FollowSymLinks
    Require all denied
    RewriteEngine Off

    <Files "php81-cgi-launcher.exe">
        Require all granted
    </Files>
</Directory>

<Directory "C:/xampp/htdocs/web lamar kerja">
    <FilesMatch "\.php$">
        SetHandler application/x-httpd-jejak-php81
    </FilesMatch>

    Action application/x-httpd-jejak-php81 "/jejak-karier-php81-cgi"
</Directory>
